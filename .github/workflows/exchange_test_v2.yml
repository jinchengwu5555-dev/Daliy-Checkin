name: 🧪 汇率对比测试 V2

on:
  workflow_dispatch:

jobs:
  test:
    name: 🧪 汇率测试 V2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 确认脚本内容
        run: grep -n "SCRIPT_VERSION\|frankfurter" scripts/daily_checkin/exchange_rates_v2.py
      - name: 运行汇率脚本（日志查看原始 markdown）
        run: |
          python scripts/daily_checkin/exchange_rates_v2.py | tee /tmp/exchange.txt
      - name: 推送到微信预览实际渲染效果
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          python - << 'EOF'
          import os, requests
          content = open('/tmp/exchange.txt').read()
          # 去掉版本标识行，只推正文
          content = '\n'.join(l for l in content.split('\n') if '脚本版本' not in l)
          r = requests.post(
              f"https://sctapi.ftqq.com/{os.environ['SERVERCHAN_KEY']}.send",
              data={'title': '🧪 汇率对比测试', 'desp': content},
              timeout=15
          )
          print('推送结果:', r.status_code, r.text[:200])
          EOF
