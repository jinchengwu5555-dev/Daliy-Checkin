name: 📊 ETF行情播报

on:
  schedule:
    # 北京时间 09:30 开盘（UTC 01:30）
    - cron: '30 1 * * 1-5'
    # 北京时间 15:00 收盘（UTC 07:00）
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  etf_stock:
    name: 📊 ETF 行情
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests yfinance -q
      - name: 获取行情并推送
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          python - <<'EOF'
          import os, requests, subprocess, sys
          result = subprocess.run(
              [sys.executable, 'scripts/daily_checkin/etf_stock.py'],
              capture_output=True, text=True
          )
          output = result.stdout.strip()
          print(output)
          key = os.environ.get('SERVERCHAN_KEY', '').strip()
          if key and output:
              r = requests.post(
                  f'https://sctapi.ftqq.com/{key}.send',
                  data={'title': '📊 ETF行情播报', 'desp': output},
                  timeout=10
              )
              print('Server酱推送:', r.json())
          EOF
