name: 🧪 Bilibili 成长值测试

on:
  workflow_dispatch:   # 仅手动触发，不定时运行

jobs:
  test:
    name: 🧪 只读测试（不签到不投币）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 运行测试脚本
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: python scripts/daily_checkin/bilibili_test.py
