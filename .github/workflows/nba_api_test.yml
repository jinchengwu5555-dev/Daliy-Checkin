name: 🧪 NBA API 可用性测试

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 测试各 NBA 数据源
        run: |
          python - << 'EOF'
          import requests, json

          UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          TESTS = [
              ('cdn.nba.com scoreboard',
               'https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json',
               {}),
              ('ESPN scoreboard',
               'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard',
               {}),
              ('ESPN site.web',
               'https://site.web.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard',
               {}),
              ('thesportsdb',
               'https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=2026-05-22&l=NBA',
               {}),
              ('balldontlie v1',
               'https://www.balldontlie.io/api/v1/games?per_page=5',
               {}),
              ('nba stats scoreboard',
               'https://stats.nba.com/stats/scoreboardv2?DayOffset=0&GameDate=05/22/2026&LeagueID=00',
               {'Referer':'https://www.nba.com/','Origin':'https://www.nba.com','x-nba-stats-origin':'stats','x-nba-stats-token':'true'}),
          ]

          for name, url, extra_h in TESTS:
              h = {'User-Agent': UA, **extra_h}
              try:
                  r = requests.get(url, headers=h, timeout=10, verify=False)
                  preview = r.text[:80].replace('\n','') if r.status_code==200 else ''
                  print(f"{'✅' if r.status_code==200 else '❌'} {r.status_code} {name}: {preview}")
              except Exception as e:
                  print(f"❌ ERR {name}: {e}")
          EOF
