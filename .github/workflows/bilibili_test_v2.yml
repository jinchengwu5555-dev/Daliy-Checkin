name: 🧪 Bilibili 成长值测试 V2

on:
  workflow_dispatch:

jobs:
  test:
    name: 🧪 只读测试 V2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 确认脚本内容
        run: grep -n "exp/reward\|home/reward\|SCRIPT_VERSION" scripts/daily_checkin/bilibili_test_v2.py
      - name: 运行测试脚本
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: python scripts/daily_checkin/bilibili_test_v2.py
