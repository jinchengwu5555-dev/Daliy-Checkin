name: 💱 今日汇率

on:
  schedule:
    # 北京时间 09:00 工作日（UTC 01:00）
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  exchange_rates:
    name: 💱 获取汇率
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 获取汇率
        run: python scripts/daily_checkin/exchange_rates.py
      - name: 推送 Server酱
        if: ${{ secrets.SERVERCHAN_KEY != '' }}
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          python - <<'EOF'
          import os, requests, subprocess, sys
          result = subprocess.run(
              [sys.executable, 'scripts/daily_checkin/exchange_rates.py'],
              capture_output=True, text=True
          )
          output = result.stdout.strip()
          key = os.environ.get('SERVERCHAN_KEY', '')
          if key and output:
              requests.post(
                  f'https://sctapi.ftqq.com/{key}.send',
                  data={'title': '💱 今日汇率', 'desp': output},
                  timeout=10
              )
          EOF
