name: 📋 每日任务汇总

on:
  schedule:
    # 北京时间 07:50（UTC+8），即 UTC 23:50
    - cron: '50 23 * * *'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 1. 百度网盘签到
  # ──────────────────────────────────────────────
  baidu:
    name: ☁️ 百度网盘签到
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 执行签到
        env:
          BAIDU_COOKIE: ${{ secrets.BAIDU_COOKIE }}
          PRIVACY_MODE: 'true'
        run: |
          mkdir -p /tmp/job_outputs
          python scripts/daily_checkin/baiduwangpan_checkin.py 2>&1 | tee /tmp/job_outputs/baidu.txt
      - name: 上传输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-baidu
          path: /tmp/job_outputs/baidu.txt
          retention-days: 1

  # ──────────────────────────────────────────────
  # 2. Bilibili 签到
  # ──────────────────────────────────────────────
  bilibili:
    name: 📺 Bilibili 签到
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 执行签到
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
        run: |
          mkdir -p /tmp/job_outputs
          python scripts/daily_checkin/bilibili_checkin.py 2>&1 | tee /tmp/job_outputs/bilibili.txt
      - name: 上传输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-bilibili
          path: /tmp/job_outputs/bilibili.txt
          retention-days: 1

  # ──────────────────────────────────────────────
  # 3. 掘金签到
  # ──────────────────────────────────────────────
  juejin:
    name: 🪙 掘金签到
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install axios
      - name: 执行签到
        env:
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
        run: |
          mkdir -p /tmp/job_outputs
          node scripts/daily_checkin/juejin_checkin.js 2>&1 | tee /tmp/job_outputs/juejin.txt
      - name: 上传输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-juejin
          path: /tmp/job_outputs/juejin.txt
          retention-days: 1

  # ──────────────────────────────────────────────
  # 5. NBA 赛程
  # ──────────────────────────────────────────────
  nba:
    name: 🏀 NBA 赛程
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests urllib3 -q
      - name: 获取赛程
        run: |
          mkdir -p /tmp/job_outputs
          python scripts/daily_checkin/nba_schedule.py 2>&1 | tee /tmp/job_outputs/nba.txt
      - name: 上传输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-nba
          path: /tmp/job_outputs/nba.txt
          retention-days: 1

  # ──────────────────────────────────────────────
  # 6. ETF 行情
  # ──────────────────────────────────────────────
  etf:
    name: 📊 ETF 行情
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests yfinance -q
      - name: 获取行情
        run: |
          mkdir -p /tmp/job_outputs
          python scripts/daily_checkin/etf_stock.py 2>&1 | tee /tmp/job_outputs/etf.txt
      - name: 上传输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-etf
          path: /tmp/job_outputs/etf.txt
          retention-days: 1

  # ──────────────────────────────────────────────
  # 7. 今日汇率
  # ──────────────────────────────────────────────
  exchange:
    name: 💱 今日汇率
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 获取汇率
        run: |
          mkdir -p /tmp/job_outputs
          python scripts/daily_checkin/exchange_rates.py 2>&1 | tee /tmp/job_outputs/exchange.txt
      - name: 上传输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-exchange
          path: /tmp/job_outputs/exchange.txt
          retention-days: 1

  # ──────────────────────────────────────────────
  # 8. 每日 60s 新闻
  # ──────────────────────────────────────────────
  news:
    name: 📰 每日 60s
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 获取新闻
        run: |
          mkdir -p /tmp/job_outputs
          python scripts/daily_checkin/news_60s.py 2>&1 | tee /tmp/job_outputs/news.txt
      - name: 上传输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-news
          path: /tmp/job_outputs/news.txt
          retention-days: 1

  # ──────────────────────────────────────────────
  # 9. RSS 资讯摘要
  # ──────────────────────────────────────────────
  rss:
    name: 📰 RSS 资讯
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 抓取 RSS
        run: |
          mkdir -p /tmp/job_outputs
          python scripts/daily_checkin/rss_digest.py 2>&1 | tee /tmp/job_outputs/rss.txt
      - name: 上传输出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-rss
          path: /tmp/job_outputs/rss.txt
          retention-days: 1

  # ──────────────────────────────────────────────
  # 汇总推送
  # ──────────────────────────────────────────────
  summary:
    name: 📋 汇总推送
    runs-on: ubuntu-latest
    needs:
      - baidu
      - bilibili
      - juejin
      - nba
      - etf
      - exchange
      - news
      - rss
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: 下载所有任务输出
        uses: actions/download-artifact@v4
        with:
          path: /tmp/job_outputs
          pattern: output-*
          merge-multiple: false
      - name: 生成并推送汇总
        env:
          SERVERCHAN_KEY:  ${{ secrets.SERVERCHAN_KEY }}
          RESULT_BAIDU:    ${{ needs.baidu.result }}
          RESULT_BILIBILI: ${{ needs.bilibili.result }}
          RESULT_JUEJIN:   ${{ needs.juejin.result }}
          RESULT_NBA:      ${{ needs.nba.result }}
          RESULT_ETF:      ${{ needs.etf.result }}
          RESULT_EXCHANGE: ${{ needs.exchange.result }}
          RESULT_NEWS:     ${{ needs.news.result }}
          RESULT_RSS:      ${{ needs.rss.result }}
          GITHUB_RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/summary_push.py
